# =============================================================================
# Flarum Helm Chart -- values.yaml
# =============================================================================
# Deploys Flarum 2.0 on Kubernetes (Talos) using a single custom FrankenPHP
# image (classic mode, port 8080) against an EXTERNAL PostgreSQL database, with
# Keycloak SSO via FriendsOfFlarum/oauth + a baked-in custom Keycloak provider.
#
# One image serves both the web server (default command) and the one-off CLI
# tasks (install / migrate / assets:publish), invoked as init containers via a
# command override. TLS terminates at the ingress -- the container speaks plain
# HTTP on 8080.
#
# See README.md for the full architecture and the init/guard flow.
# =============================================================================

# ---------------------------------------------------------------------------
# Flarum container image
# ---------------------------------------------------------------------------
# The image bakes Flarum + fof/oauth + the custom Keycloak provider at build
# time. image.tag defaults to Chart.appVersion when left empty.
image:
  repository: ghcr.io/anatoly-lab/flarum-k8s
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Flarum configuration
# ---------------------------------------------------------------------------
flarum:
  # REQUIRED -- the public base URL of the forum, scheme included
  # (e.g. https://forum.example.com). Written to config.php as `url` and seeded
  # into the install file's `baseUrl`. Keycloak's redirect URI is
  # <url>/auth/keycloak.
  url: ""

  # Flarum debug mode. Keep false in production -- when true Flarum does NOT
  # cache the fof-oauth provider payload, which is convenient while wiring up
  # SSO but leaks stack traces.
  debug: false

  # -- Admin account (created once, at install time) --
  admin:
    username: "admin"
    email: ""
    # Inline password. Ignored if existingSecret is set. Goes into the rendered
    # install.yml Secret -- never set this in a git-committed values file; use
    # existingSecret (Vault/ESO) instead.
    password: ""
    # Use an existing Secret for the admin password.
    existingSecret: ""
    secretKey: admin-password

  # -- PostgreSQL (external -- NOT deployed by this chart) --
  # Reuse-existing-Postgres model: point this at a CNPG cluster, a managed PG,
  # etc. The database must already exist and the user must own it.
  database:
    host: ""
    port: 5432
    name: flarum
    username: flarum
    # search_path / schema. Flarum's install file takes search_path; public is
    # the standard schema.
    searchPath: public
    # Table name prefix (Flarum's `prefix`). Empty = no prefix.
    prefix: ""
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the database password.
    existingSecret: ""
    secretKey: db-password

  # -- Keycloak SSO (FriendsOfFlarum/oauth + custom provider) --
  # When enabled, the install file seeds the fof-oauth.keycloak.* settings rows
  # so SSO works on first boot with no admin click-ops. The client_secret is
  # stored PLAINTEXT in the Flarum `settings` table (a FoF property) -- it is
  # sourced from a k8s Secret, never committed to git.
  keycloak:
    enabled: false
    clientId: ""
    # Inline client secret. Ignored if existingSecret is set.
    clientSecret: ""
    existingSecret: ""
    secretKey: keycloak-client-secret
    # Keycloak base URL, NO trailing /auth (KC 17+). e.g. https://kc.example.com
    authServerUrl: ""
    realm: ""
    # -- SSO-only mode --
    # When true (and keycloak.enabled), seed `allow_sign_up=0` so LOCAL self-
    # registration is disabled: the public Sign-Up form is closed and the core
    # user-create endpoint becomes admin-only.
    #
    # LIMITATIONS (verified against Flarum 2.0 core source, see README):
    #   1. New Keycloak users CANNOT auto-provision. fof/oauth routes a brand-new
    #      user through core's user-create endpoint, which `allow_sign_up=0`
    #      gates to admins only -- and the OAuth registration token does NOT
    #      bypass that gate. There is no fof/oauth or core setting to allow
    #      "register via OAuth while local sign-up is closed" without a heavier,
    #      questionable extension (deliberately NOT added). So pre-create the
    #      accounts in Flarum (matching emails) or flip ssoOnly off to onboard.
    #   2. EXISTING users still log in via SSO: fof/oauth's login-provider match
    #      and email-match auto-link paths log the user in DIRECTLY, never
    #      touching the gated create endpoint. This is how the install-time admin
    #      (whose email matches its Keycloak account) auto-links on first SSO
    #      login -- so the admin stays usable.
    #   3. The LOCAL password login form is NOT hidden -- core has no setting to
    #      remove it, and doing so cleanly would need an extra extension. Local
    #      admin login therefore remains as an intentional fallback.
    ssoOnly: false

  # -- Outgoing email (SMTP) --
  # Flarum stores mail config as rows in the DB `settings` table; this chart
  # seeds them into the install file's `settings` map. The non-secret fields
  # below are written verbatim; the SMTP username + password come from an
  # EXISTING in-namespace Secret (NOT the chart's rendered install Secret) and
  # are injected into install.yml at runtime via the same placeholder mechanism
  # used for the db/admin/keycloak secrets -- they never touch git or a ConfigMap.
  #
  # Verified Flarum 2.0 core mail setting keys: mail_driver, mail_host,
  # mail_port, mail_encryption, mail_username, mail_password, mail_from. There is
  # NO from-name setting -- the sender display name is the forum_title
  # (set it via extraSettings.forum_title if you want a specific name).
  mail:
    enabled: false
    # Mail driver. `smtp` is the only driver this block wires up.
    driver: smtp
    # SMTP server host, e.g. mail.smtp2go.com
    host: ""
    # SMTP port. 587 = STARTTLS (encryption: tls), 465 = implicit TLS
    # (encryption: ssl), 25 = plain (encryption: "").
    port: 587
    # Connection encryption. "tls" = STARTTLS, "ssl" = implicit TLS, "" = none.
    encryption: tls
    # Envelope/sender From address, e.g. forum@example.com
    from: ""
    # SMTP credentials live in an EXISTING Secret in the release namespace
    # (default: smtp-credentials with keys username/password). Required when
    # mail.enabled -- there is intentionally no inline fallback for SMTP creds.
    existingSecret: smtp-credentials
    usernameKey: username
    passwordKey: password

  # -- fof/upload S3 / CDN storage for user uploads (attachments) --
  # Routes user-uploaded images/attachments to S3-compatible object storage
  # (MinIO now; Cloudflare R2 / Backblaze B2 later -- switch by endpoint+creds+
  # bucket only) served via an optional CDN URL. Default OFF.
  #
  # HOW IT WIRES (verified against FriendsOfFlarum/upload 2.x source):
  #   - When enabled, the chart sets the FOF_UPLOAD_AWS_S3_* env vars on the WEB
  #     container. fof/upload's Driver/Config::shouldUseEnv() short-circuits to
  #     ENV mode when bucket+region (+ key/secret OR useIam) are present, so the
  #     S3 client is built entirely from env -- no admin click-ops for creds.
  #   - Env mode supplies S3 CONFIG/CREDENTIALS ONLY. It does NOT, by itself,
  #     route uploads to S3: fof/upload picks the adapter PER MIME TYPE via the
  #     `fof-upload.mimeTypes` settings row. The chart SEEDS that row (images ->
  #     `aws-s3` adapter) at INSTALL time. On an ALREADY-installed forum, flipping
  #     this on enables the extension (via the enable-extensions reconcile) but
  #     does NOT seed mimeTypes -- set the upload method once in the admin UI.
  #   - `fof-upload` is auto-added to flarum.extensions (so it gets enabled).
  #   - ACL is left UNSET by default (empty) -> no x-amz-acl header, which is
  #     required for Cloudflare R2 (R2 rejects ACLs). MinIO needs pathStyle=true.
  #
  # The access key + secret come from a k8s Secret via secretKeyRef (NEVER git),
  # like the other credentials. Non-secret fields below render as plain env.
  upload:
    enabled: false
    # S3 endpoint, e.g.
    #   MinIO (in-cluster): http://minio.development.svc.cluster.local:9000
    #   R2:  https://<account>.r2.cloudflarestorage.com
    #   B2:  https://s3.<region>.backblazeb2.com
    endpoint: ""
    # Region. R2 = "auto"; MinIO = any (e.g. us-east-1); B2 = match endpoint.
    region: ""
    # Target bucket (must already exist).
    bucket: ""
    # Path-style addressing. MinIO REQUIRES true; R2/B2 virtual-host can use false.
    pathStyle: true
    # Object ACL. Leave EMPTY for R2 (it rejects ACLs). Only emitted when set.
    acl: ""
    # Public/CDN base URL used to SERVE uploads (R2 custom domain, B2+Cloudflare,
    # or a public MinIO ingress). Maps to FOF_UPLOAD_AWS_S3_CUSTOM_URL (highest
    # precedence in fof/upload's URL resolution). Only emitted when set.
    cdnUrl: ""
    # S3 credentials. Sourced from an EXISTING Secret in the release namespace
    # (Vault/ESO), never inlined into git. Required when upload.enabled.
    existingSecret: ""
    accessKeyKey: access-key-id
    secretKeyKey: secret-access-key

  # -- Extensions enabled (install-time AND every-boot reconcile) --
  # Flarum extension IDs (NOT composer package names). These must already be
  # composer-installed in the image. fof-oauth + the custom Keycloak provider are
  # required for SSO.
  #
  # This list is used in TWO places:
  #   1. Fresh install: comma-joined into the install file's `extensions` key, so
  #      a brand-new forum comes up with exactly these enabled.
  #   2. Every boot: the `enable-extensions` reconcile init container UNIONs this
  #      list into the core `extensions_enabled` settings row (a JSON array of
  #      extension IDs). This is what makes "add an extension to the image + to
  #      this list -> recreate the pod -> extension enabled" work GitOps-style,
  #      even though the install step is guarded (runs once).
  #
  # SEMANTICS -- ADDITIVE / UNION ONLY:
  #   - Adding an ID here enables it on the next boot (idempotent: no-op if all
  #     desired are already enabled).
  #   - REMOVING an ID here does NOT disable it. The reconcile never removes IDs
  #     from `extensions_enabled`. This is deliberate: auto-disabling on a values
  #     edit could disable fof-oauth and lock everyone out of SSO. To DISABLE an
  #     extension, do it in the admin UI (or delete the row manually).
  #
  # When flarum.upload.enabled, `fof-upload` is appended to this list
  # automatically (see flarum.upload) so it is enabled alongside its env wiring.
  extensions:
    - fof-oauth
    - anatolylab-keycloak-provider

  # -- Extra settings seeded into the `settings` table at install time --
  # Arbitrary key -> value map merged into the install file's `settings` map
  # (on top of the keycloak.* keys the chart adds when keycloak.enabled). Use
  # for forum_title, welcome_title, theme colors, etc. Values are strings.
  # Example:
  #   extraSettings:
  #     forum_title: "My Community"
  #     welcome_title: "Welcome!"
  extraSettings: {}

# ---------------------------------------------------------------------------
# Init containers
# ---------------------------------------------------------------------------
initContainers:
  # Optional busybox `nc` loop that blocks until PostgreSQL accepts TCP
  # connections, so the install/migrate steps don't fail fast on a cold DB.
  waitForPostgres:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Persistent storage
# ---------------------------------------------------------------------------
# Three RWO PVCs. The image bakes the app into /app, so we must NOT mount a
# volume over /app itself -- only over the sub-paths that hold runtime state.
#
# Talos has no default StorageClass -- you MUST set persistence.*.storageClass
# (or a global default via the cluster) or the PVCs stay Pending.
persistence:
  # /app/storage -- logs, cache, sessions, formatter cache.
  storage:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

  # /app/public/assets -- uploads (logos, avatars) AND published assets. This
  # mount STARTS EMPTY and shadows the baked assets, which is exactly why
  # `flarum assets:publish` MUST run on every boot (see the assets-publish init
  # container) -- otherwise the forum renders with no CSS.
  assets:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

  # config.php durability. `flarum install` writes config.php ONCE; on an
  # ephemeral filesystem it is lost on restart and the web pod boots into the
  # web installer. We persist it on a tiny PVC mounted at a directory and
  # symlink /app/config.php to it (see the link-config init container and the
  # README "config.php durability" section for why a directory mount + symlink
  # is used instead of a subPath file mount).
  config:
    enabled: true
    size: 64Mi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
# Service port 80 -> container targetPort 8080 (FrankenPHP classic mode).
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
# TLS is terminated HERE (auto-HTTPS is disabled in the image). Point your TLS
# secret at the ingress.
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   hosts:
  #     - host: forum.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Example:
  #   tls:
  #     - secretName: forum-tls
  #       hosts:
  #         - forum.example.com
  tls: []

# ---------------------------------------------------------------------------
# Web container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Common metadata (applied to EVERY resource this chart renders)
# ---------------------------------------------------------------------------
# Labels merged into the shared label set (Deployment, Service, Secret,
# Ingress, ServiceAccount, PVCs). NOT added to the immutable selector labels,
# so they're safe to change on an existing release.
commonLabels: {}
# Annotations merged into metadata.annotations of every rendered resource.
# Per-resource annotations (e.g. the PVC's helm.sh/resource-policy) are
# preserved, not clobbered.
commonAnnotations: {}

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
# Assign the pod to a PriorityClass (must already exist). Empty = none required.
priorityClassName: ""

# ---------------------------------------------------------------------------
# Extra volumes / volume mounts (escape hatch)
# ---------------------------------------------------------------------------
# Arbitrary extra pod volumes and the mounts attached to the web container.
extraVolumes: []
extraVolumeMounts: []

# ---------------------------------------------------------------------------
# Pod metadata and security (PSA "restricted" friendly)
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext:
  # The image runs as uid/gid 1000. fsGroup makes the RWO PVC mounts
  # group-writable by that user. OnRootMismatch avoids re-chowning on every
  # restart.
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
# Container-level securityContext applied to ALL containers (init + web).
securityContext:
  # The image's Dockerfile ends with `USER 1000:1000`; refuse to start if a
  # future base image regresses to root.
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  # FrankenPHP/Caddy and Flarum write to /app, /app/storage, /data, /config at
  # runtime, so the root fs must stay writable.
  readOnlyRootFilesystem: false
  capabilities:
    # SERVER_NAME binds the non-privileged port 8080, so no capabilities are
    # needed -- drop the whole default set.
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

restartPolicy: Always
terminationGracePeriodSeconds: 30
