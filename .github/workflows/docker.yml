# =============================================================================
# Docker image CI/CD — single-arch (amd64)
# =============================================================================
# Builds the custom Flarum image and publishes it to GHCR.
#
# Unlike the Discourse pipeline (which splits amd64/arm64 across native runners
# because Ruby asset precompilation crashes under QEMU), Flarum is plain PHP and
# needs no asset precompile, so a single linux/amd64 build-and-push job suffices.
#
# Trigger examples:
#   git tag docker/v0.1.0 && git push origin docker/v0.1.0
#
# Note: `paths` filters are ignored for tag pushes (GitHub Actions behavior),
# so pushing a `docker/v*` tag always triggers regardless of which files changed.
# =============================================================================

name: Docker

on:
  push:
    branches: [main]
    paths: ["docker/**"]
    tags: ["docker/v*"]
  pull_request:
    paths: ["docker/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # Build the amd64 image; push only on a docker/v* tag.
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/docker/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/docker/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/docker/}"
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flarum-k8s
          tags: |
            # On tag push: version (keep the "v") + latest
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release }}
            # On main push / PR: SHA-based tag for build validation (no push)
            type=sha,enable=${{ steps.version.outputs.is_release == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/
          push: ${{ steps.version.outputs.is_release == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=build
          cache-to: type=gha,mode=max,scope=build
