apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flarum.fullname" . }}
  labels:
    {{- include "flarum.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  strategy:
    # RWO PVCs (storage/assets/config) can attach to only one pod at a time, so
    # we must fully tear down the old pod before the new one starts.
    type: Recreate
  selector:
    matchLabels:
      {{- include "flarum.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "flarum.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flarum.serviceAccountName" . }}
      # Flarum never calls the Kubernetes API; don't auto-mount the SA token.
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: {{ .Values.restartPolicy }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      initContainers:
        # ---- Make config.php durable (symlink onto the config PVC) ----
        # Flarum reads /app/config.php on the ephemeral rootfs. We keep the real
        # file on the config PVC (mounted at {{ include "flarum.configDir" . }})
        # and point /app/config.php at it so the file survives restarts and the
        # web pod never boots into the installer. `install` writes through this
        # symlink, landing config.php on the PVC. Idempotent every boot.
        - name: link-config
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              CFG_DIR="{{ include "flarum.configDir" . }}"
              # Replace /app/config.php with a symlink to the PVC-backed file.
              # -f handles a pre-existing regular file (e.g. a baked stub) or an
              # already-correct symlink.
              ln -sfn "${CFG_DIR}/config.php" /app/config.php
              echo "Linked /app/config.php -> ${CFG_DIR}/config.php"
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        {{- if .Values.initContainers.waitForPostgres.enabled }}
        # ---- Wait for PostgreSQL to be reachable ----
        - name: wait-for-postgres
          image: "{{ .Values.initContainers.waitForPostgres.image.repository }}:{{ .Values.initContainers.waitForPostgres.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.waitForPostgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ .Values.flarum.database.host }}:{{ .Values.flarum.database.port }}..."
              until nc -z "{{ .Values.flarum.database.host }}" "{{ .Values.flarum.database.port }}"; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is reachable."
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}

        # ---- Install (guarded, runs once) ----
        # `flarum install` has NO built-in "already installed" guard, and
        # config.php is NOT a reliable sentinel (it can be regenerated). So we
        # guard on DB state: if the `settings` table already holds the `version`
        # row (always written by install), we skip. Otherwise we render the
        # install file (substituting secrets from env) and run install. Once
        # install succeeds, config.php lands on the config PVC (via the symlink)
        # and the DB has the version row, so subsequent boots skip this step.
        - name: install
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              # The storage PVC mounts over /app/storage and starts EMPTY, shadowing
              # the storage skeleton baked into the image. Recreate the directories
              # Flarum requires (sessions/cache/etc.) on the volume. Idempotent;
              # runs every boot (before the install guard) so they always exist.
              mkdir -p /app/storage/sessions /app/storage/cache \
                       /app/storage/formatter /app/storage/less \
                       /app/storage/locale /app/storage/tmp \
                       /app/storage/views /app/storage/logs
              # Guard: is Flarum already installed? Check the settings.version
              # row via PDO (pdo_pgsql is in the image). Exit code 10 = installed.
              set +e
              php -r '
                $dsn = sprintf("pgsql:host=%s;port=%s;dbname=%s",
                  getenv("FLARUM_DB_HOST"), getenv("FLARUM_DB_PORT"), getenv("FLARUM_DB_NAME"));
                try {
                  $pdo = new PDO($dsn, getenv("FLARUM_DB_USER"), getenv("FLARUM_DB_PASSWORD"),
                    [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION]);
                  $prefix = getenv("FLARUM_DB_PREFIX");
                  $stmt = $pdo->query("SELECT value FROM " . $prefix . "settings WHERE key = " . "\x27version\x27");
                  if ($stmt && $stmt->fetch()) { exit(10); }
                  exit(0);
                } catch (Throwable $e) {
                  // Table/DB not ready yet -> treat as not installed.
                  exit(0);
                }
              '
              GUARD=$?
              set -e
              if [ "$GUARD" -eq 10 ]; then
                echo "Flarum already installed (settings.version present); skipping install."
                exit 0
              fi
              echo "Flarum not installed; rendering install file and installing..."
              # Inject secrets into the install file at runtime. Done in PHP with
              # a literal str_replace (NOT sed) so passwords containing /, &, |
              # or other regex-special characters are substituted verbatim. The
              # template already wraps each placeholder in YAML double quotes and
              # we escape \ and " in the value, so a secret with quotes/backslashes
              # still produces valid YAML.
              php -r '
                $tpl = file_get_contents("/config/install.yml");
                $esc = function ($v) { return str_replace(["\\", "\""], ["\\\\", "\\\""], (string) $v); };
                $tpl = str_replace("__DB_PASSWORD__", $esc(getenv("FLARUM_DB_PASSWORD")), $tpl);
                $tpl = str_replace("__ADMIN_PASSWORD__", $esc(getenv("FLARUM_ADMIN_PASSWORD")), $tpl);
                $tpl = str_replace("__KEYCLOAK_CLIENT_SECRET__", $esc(getenv("FLARUM_KEYCLOAK_CLIENT_SECRET") ?: ""), $tpl);
                $tpl = str_replace("__MAIL_USERNAME__", $esc(getenv("FLARUM_MAIL_USERNAME") ?: ""), $tpl);
                $tpl = str_replace("__MAIL_PASSWORD__", $esc(getenv("FLARUM_MAIL_PASSWORD") ?: ""), $tpl);
                file_put_contents("/tmp/install.yml", $tpl);
              '
              php flarum install --file=/tmp/install.yml
              echo "Install complete."
          env:
            - name: FLARUM_DB_HOST
              value: {{ .Values.flarum.database.host | quote }}
            - name: FLARUM_DB_PORT
              value: {{ .Values.flarum.database.port | quote }}
            - name: FLARUM_DB_NAME
              value: {{ .Values.flarum.database.name | quote }}
            - name: FLARUM_DB_USER
              value: {{ .Values.flarum.database.username | quote }}
            - name: FLARUM_DB_PREFIX
              value: {{ .Values.flarum.database.prefix | quote }}
            - name: FLARUM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "flarum.secretName" .) .Values.flarum.database.existingSecret }}
                  key: {{ if .Values.flarum.database.existingSecret }}{{ .Values.flarum.database.secretKey }}{{ else }}db-password{{ end }}
            - name: FLARUM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "flarum.secretName" .) .Values.flarum.admin.existingSecret }}
                  key: {{ if .Values.flarum.admin.existingSecret }}{{ .Values.flarum.admin.secretKey }}{{ else }}admin-password{{ end }}
            {{- if .Values.flarum.keycloak.enabled }}
            - name: FLARUM_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "flarum.secretName" .) .Values.flarum.keycloak.existingSecret }}
                  key: {{ if .Values.flarum.keycloak.existingSecret }}{{ .Values.flarum.keycloak.secretKey }}{{ else }}keycloak-client-secret{{ end }}
            {{- end }}
            {{- if .Values.flarum.mail.enabled }}
            # SMTP creds come from an EXISTING in-namespace Secret (never the
            # chart's rendered install Secret), injected into install.yml via the
            # __MAIL_USERNAME__/__MAIL_PASSWORD__ placeholders above.
            - name: FLARUM_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ required "flarum.mail.existingSecret is required when mail.enabled" .Values.flarum.mail.existingSecret }}
                  key: {{ .Values.flarum.mail.usernameKey }}
            - name: FLARUM_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "flarum.mail.existingSecret is required when mail.enabled" .Values.flarum.mail.existingSecret }}
                  key: {{ .Values.flarum.mail.passwordKey }}
            {{- end }}
          volumeMounts:
            - name: install-file
              mountPath: /config
              readOnly: true
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
            - name: assets
              mountPath: /app/public/assets
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Enable extensions (additive reconcile, every boot) ----
        # WHY: the `install` step is guarded (runs once), so adding a new
        # extension to the image + the desired list does NOT enable it on an
        # already-installed forum. This container closes that gap GitOps-style:
        # "add extension to values -> recreate pod -> extension enabled".
        #
        # WHAT IT DOES: reads the core `extensions_enabled` settings row
        # (verified against Flarum 2.x ExtensionManager: a JSON-encoded array of
        # extension ID strings, e.g. ["fof-oauth","fof-upload"]), UNIONs it with
        # the DESIRED_EXTENSIONS list, and UPSERTs it back ONLY if it changed.
        #   - ADDITIVE/UNION ONLY: never removes IDs. Removing an ID from values
        #     does NOT disable it (avoids accidentally disabling SSO and locking
        #     everyone out). Disable must be done via the admin UI.
        #   - Idempotent: no-op when all desired IDs are already enabled.
        #   - Safe pre-install: if the settings table/row is missing (forum not
        #     yet installed, or a brand-new install on this same boot), it exits
        #     cleanly without writing -- the guarded `install` above already
        #     seeded `extensions_enabled` from the same desired list on a fresh
        #     install, so there is nothing to reconcile.
        #
        # WHY set-row + the existing migrate + assets-publish == a full enable:
        # this mirrors Flarum core's install step EnableBundledExtensions::run()
        # (and ExtensionManager::enable()) exactly -- per extension it runs
        # migrate() + copyAssetsTo() and then sets `extensions_enabled`. We do the
        # SAME three operations, just split across init containers:
        #   this container -> sets extensions_enabled
        #   migrate (next) -> runs the newly-enabled extension's migrations
        #   assets-publish -> publishes its JS/CSS
        # Ordering is correct: we write the row BEFORE `migrate`, and a fresh
        # `php flarum` CLI process reads settings straight from the DB (core wraps
        # DatabaseSettingsRepository only in an in-memory MemoryCacheSettings-
        # Repository that starts EMPTY per process -- there is NO persisted
        # settings file cache), so `migrate` sees the just-written row and runs
        # the new extension's migrations this same boot. cache-clear (last) clears
        # the formatter/translation caches so the new extension takes effect.
        - name: enable-extensions
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              # Mirror DatabaseSettingsRepository::set() (SELECT then
              # update-or-insert) rather than relying on an ON CONFLICT target.
              # Union desired IDs into extensions_enabled; write only if changed.
              php -r '
                $dsn = sprintf("pgsql:host=%s;port=%s;dbname=%s",
                  getenv("FLARUM_DB_HOST"), getenv("FLARUM_DB_PORT"), getenv("FLARUM_DB_NAME"));
                $desired = array_values(array_filter(array_map("trim",
                  explode(",", (string) getenv("DESIRED_EXTENSIONS")))));
                if (!$desired) { fwrite(STDERR, "No desired extensions; nothing to do.\n"); exit(0); }
                try {
                  $pdo = new PDO($dsn, getenv("FLARUM_DB_USER"), getenv("FLARUM_DB_PASSWORD"),
                    [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION]);
                } catch (Throwable $e) {
                  fwrite(STDERR, "DB not reachable; skipping extension reconcile: " . $e->getMessage() . "\n");
                  exit(0);
                }
                $prefix = (string) getenv("FLARUM_DB_PREFIX");
                $table  = $prefix . "settings";
                $key    = "extensions_enabled";
                try {
                  // Forum not installed yet -> settings table/row absent: skip.
                  $sel = $pdo->prepare("SELECT value FROM " . $table . " WHERE key = ?");
                  $sel->execute([$key]);
                  $row = $sel->fetch(PDO::FETCH_ASSOC);
                } catch (Throwable $e) {
                  fwrite(STDERR, "settings table not ready; skipping reconcile: " . $e->getMessage() . "\n");
                  exit(0);
                }
                $current = [];
                $rowExists = ($row !== false);
                if ($rowExists && $row["value"] !== null && $row["value"] !== "") {
                  $decoded = json_decode($row["value"], true);
                  if (is_array($decoded)) { $current = $decoded; }
                }
                // Union: keep existing order, append only genuinely-new IDs.
                $merged = $current;
                foreach ($desired as $id) {
                  if (!in_array($id, $merged, true)) { $merged[] = $id; }
                }
                // Compare as sets -> no-op when nothing new.
                $a = $current; $b = $merged; sort($a); sort($b);
                if ($a === $b) {
                  echo "extensions_enabled already a superset of desired; no change.\n";
                  exit(0);
                }
                $value = json_encode(array_values($merged));
                if ($rowExists) {
                  $upd = $pdo->prepare("UPDATE " . $table . " SET value = ? WHERE key = ?");
                  $upd->execute([$value, $key]);
                } else {
                  $ins = $pdo->prepare("INSERT INTO " . $table . " (key, value) VALUES (?, ?)");
                  $ins->execute([$key, $value]);
                }
                echo "extensions_enabled updated -> " . $value . "\n";
              '
          env:
            - name: FLARUM_DB_HOST
              value: {{ .Values.flarum.database.host | quote }}
            - name: FLARUM_DB_PORT
              value: {{ .Values.flarum.database.port | quote }}
            - name: FLARUM_DB_NAME
              value: {{ .Values.flarum.database.name | quote }}
            - name: FLARUM_DB_USER
              value: {{ .Values.flarum.database.username | quote }}
            - name: FLARUM_DB_PREFIX
              value: {{ .Values.flarum.database.prefix | quote }}
            - name: FLARUM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "flarum.secretName" .) .Values.flarum.database.existingSecret }}
                  key: {{ if .Values.flarum.database.existingSecret }}{{ .Values.flarum.database.secretKey }}{{ else }}db-password{{ end }}
            # Desired enabled-extension IDs (comma-separated). Same source of
            # truth as the install file's `extensions` key (see the
            # flarum.desiredExtensions helper): flarum.extensions plus fof-upload
            # when upload.enabled.
            - name: DESIRED_EXTENSIONS
              value: {{ include "flarum.desiredExtensions" . | quote }}
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Migrate (idempotent, every boot) ----
        # Safe to run on every boot; catches new core/extension migrations on
        # image upgrades. Only meaningful after install has written config.php.
        - name: migrate
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "flarum", "migrate"]
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
            - name: assets
              mountPath: /app/public/assets
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Publish assets (idempotent, MANDATORY every boot) ----
        # The assets PVC starts empty and shadows the baked assets, so without
        # this the forum renders with no CSS. Re-publishing is idempotent.
        - name: assets-publish
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "flarum", "assets:publish"]
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
            - name: assets
              mountPath: /app/public/assets
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ---- Clear cache (idempotent, every boot) ----
        # Flarum caches compiled translations/settings/formatter under
        # /app/storage/cache, which lives on the PERSISTENT storage PVC. Without
        # clearing, an image/extension/locale upgrade keeps serving stale cached
        # data on the new pod. Clearing on every boot makes upgrades take effect.
        - name: cache-clear
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "flarum", "cache:clear"]
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
            - name: assets
              mountPath: /app/public/assets
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      containers:
        # ---- FrankenPHP web server (classic mode, port 8080) ----
        # No `command`: use the image's DEFAULT command (frankenphp run). TLS is
        # terminated at the ingress; this speaks plain HTTP.
        - name: web
          image: {{ include "flarum.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- if .Values.flarum.upload.enabled }}
          # ---- fof/upload S3/CDN env (read at RUNTIME by the web process) ----
          # fof/upload's Driver/Config::shouldUseEnv() activates ENV mode when
          # bucket+region (+ key/secret) are present and builds the S3 client from
          # these. Adapter ROUTING is via the `fof-upload.mimeTypes` settings row
          # (seeded at install; see secret.yaml). Empty-valued ACL/CUSTOM_URL are
          # omitted entirely (no x-amz-acl -> R2-safe).
          env:
            - name: FOF_UPLOAD_AWS_S3_ENDPOINT
              value: {{ .Values.flarum.upload.endpoint | quote }}
            - name: FOF_UPLOAD_AWS_S3_REGION
              value: {{ .Values.flarum.upload.region | quote }}
            - name: FOF_UPLOAD_AWS_S3_BUCKET
              value: {{ .Values.flarum.upload.bucket | quote }}
            - name: FOF_UPLOAD_AWS_S3_PATH_STYLE_ENDPOINT
              value: {{ .Values.flarum.upload.pathStyle | quote }}
            {{- if .Values.flarum.upload.acl }}
            - name: FOF_UPLOAD_AWS_S3_ACL
              value: {{ .Values.flarum.upload.acl | quote }}
            {{- end }}
            {{- if .Values.flarum.upload.cdnUrl }}
            # CUSTOM_URL has the highest precedence in fof/upload's public-URL
            # resolution -- this is the URL browsers fetch uploads from (CDN /
            # R2 custom domain / public MinIO ingress).
            - name: FOF_UPLOAD_AWS_S3_CUSTOM_URL
              value: {{ .Values.flarum.upload.cdnUrl | quote }}
            {{- end }}
            - name: FOF_UPLOAD_AWS_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "flarum.upload.existingSecret is required when upload.enabled" .Values.flarum.upload.existingSecret }}
                  key: {{ .Values.flarum.upload.accessKeyKey }}
            - name: FOF_UPLOAD_AWS_S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "flarum.upload.existingSecret is required when upload.enabled" .Values.flarum.upload.existingSecret }}
                  key: {{ .Values.flarum.upload.secretKeyKey }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ include "flarum.configDir" . }}
            - name: storage
              mountPath: /app/storage
            - name: assets
              mountPath: /app/public/assets
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: install-file
          secret:
            secretName: {{ include "flarum.secretName" . }}
            items:
              - key: install.yml
                path: install.yml
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "flarum.configPvcName" . }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "flarum.storagePvcName" . }}
        - name: assets
          persistentVolumeClaim:
            claimName: {{ include "flarum.assetsPvcName" . }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
