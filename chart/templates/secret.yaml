{{- /*
Chart-managed Secret.

Holds two things:

  1. install.yml -- the Flarum install file (`php flarum install --file=...`).
     Secret values (db / admin / keycloak passwords) are NOT inlined here:
     they are written as the literal placeholders __DB_PASSWORD__,
     __ADMIN_PASSWORD__ and __KEYCLOAK_CLIENT_SECRET__, and the `install` init
     container substitutes them at runtime from env vars (sourced from this
     Secret or from a user-supplied existingSecret). This keeps the rendered
     manifest free of secrets when existingSecret is used, while giving one
     uniform code path for both modes. install.yml itself is a secret-shaped
     object (it carries placeholders, not values), but it lives in a Secret
     rather than a ConfigMap for defence in depth.

  2. The inline secret values (db-password / admin-password /
     keycloak-client-secret) -- ONLY for the credentials the user supplied
     inline (no existingSecret). The deployment env wires these into the
     install init via secretKeyRef.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flarum.secretName" . }}
  labels:
    {{- include "flarum.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  install.yml: |
    debug: {{ .Values.flarum.debug }}
    baseUrl: {{ required "flarum.url is required" .Values.flarum.url | quote }}
    databaseConfiguration:
      driver: pgsql
      host: {{ required "flarum.database.host is required" .Values.flarum.database.host | quote }}
      port: {{ .Values.flarum.database.port }}
      database: {{ .Values.flarum.database.name | quote }}
      search_path: {{ .Values.flarum.database.searchPath | quote }}
      username: {{ .Values.flarum.database.username | quote }}
      password: "__DB_PASSWORD__"
      prefix: {{ .Values.flarum.database.prefix | quote }}
    adminUser:
      username: {{ .Values.flarum.admin.username | quote }}
      password: "__ADMIN_PASSWORD__"
      email: {{ required "flarum.admin.email is required" .Values.flarum.admin.email | quote }}
    settings:{{ if not (or .Values.flarum.keycloak.enabled .Values.flarum.mail.enabled (and .Values.flarum.keycloak.enabled .Values.flarum.keycloak.ssoOnly) .Values.flarum.extraSettings) }} {}{{ end }}
      {{- if .Values.flarum.keycloak.enabled }}
      fof-oauth.keycloak: "1"
      fof-oauth.keycloak.client_id: {{ required "flarum.keycloak.clientId is required when keycloak.enabled" .Values.flarum.keycloak.clientId | quote }}
      fof-oauth.keycloak.client_secret: "__KEYCLOAK_CLIENT_SECRET__"
      fof-oauth.keycloak.auth_server_url: {{ required "flarum.keycloak.authServerUrl is required when keycloak.enabled" .Values.flarum.keycloak.authServerUrl | quote }}
      fof-oauth.keycloak.realm: {{ required "flarum.keycloak.realm is required when keycloak.enabled" .Values.flarum.keycloak.realm | quote }}
      {{- if .Values.flarum.keycloak.ssoOnly }}
      # SSO-only: disable local self-registration. Value is the STRING "0"
      # because Flarum core gates on `! settings->get('allow_sign_up')` and a
      # non-empty string like "false" is PHP-truthy (would leave sign-up OPEN).
      allow_sign_up: "0"
      {{- end }}
      {{- end }}
      {{- if .Values.flarum.mail.enabled }}
      mail_driver: {{ .Values.flarum.mail.driver | quote }}
      mail_host: {{ required "flarum.mail.host is required when mail.enabled" .Values.flarum.mail.host | quote }}
      mail_port: {{ .Values.flarum.mail.port | quote }}
      mail_encryption: {{ .Values.flarum.mail.encryption | quote }}
      mail_from: {{ required "flarum.mail.from is required when mail.enabled" .Values.flarum.mail.from | quote }}
      mail_username: "__MAIL_USERNAME__"
      mail_password: "__MAIL_PASSWORD__"
      {{- end }}
      {{- range $key, $value := .Values.flarum.extraSettings }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    extensions: {{ join "," .Values.flarum.extensions | quote }}
    queue:
      driver: sync
  {{- if and .Values.flarum.database.password (not .Values.flarum.database.existingSecret) }}
  db-password: {{ .Values.flarum.database.password | quote }}
  {{- end }}
  {{- if and .Values.flarum.admin.password (not .Values.flarum.admin.existingSecret) }}
  admin-password: {{ .Values.flarum.admin.password | quote }}
  {{- end }}
  {{- if and .Values.flarum.keycloak.enabled .Values.flarum.keycloak.clientSecret (not .Values.flarum.keycloak.existingSecret) }}
  keycloak-client-secret: {{ .Values.flarum.keycloak.clientSecret | quote }}
  {{- end }}
